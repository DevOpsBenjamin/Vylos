name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

# Setup — OIDC trusted publishing (no token needed):
#   1. Publish both packages manually once: npm login && pnpm --filter @vylos/core publish --access public
#   2. On npmjs.com → @vylos/core → Settings → Trusted Publisher → GitHub Actions
#      - Owner: <your-github-org-or-user>
#      - Repository: <repo-name>
#      - Workflow: publish.yml
#   3. Repeat for @vylos/cli
#   That's it — no NPM_TOKEN secret needed, no token rotation.

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Publish @vylos/core
        if: ${{ !inputs.dry-run }}
        run: pnpm --filter @vylos/core publish --access public --no-git-checks --provenance

      - name: Publish @vylos/cli
        if: ${{ !inputs.dry-run }}
        run: pnpm --filter @vylos/cli publish --access public --no-git-checks --provenance

      - name: Dry run — @vylos/core
        if: ${{ inputs.dry-run }}
        run: pnpm --filter @vylos/core publish --access public --no-git-checks --dry-run

      - name: Dry run — @vylos/cli
        if: ${{ inputs.dry-run }}
        run: pnpm --filter @vylos/cli publish --access public --no-git-checks --dry-run
