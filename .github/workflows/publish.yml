name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

# Setup:
#   Option A — OIDC trusted publishing (recommended, no secret needed):
#     1. Go to npmjs.com → package settings → Publishing access
#     2. Add trusted publisher: GitHub Actions
#     3. Enter repo owner, repo name, workflow filename (publish.yml)
#     4. The workflow uses --provenance and id-token: write — no NPM_TOKEN needed
#
#   Option B — Granular access token (fallback):
#     1. Go to npmjs.com/settings/~/tokens → Generate New Token → Granular
#     2. Scope: read/write for @vylos/core and @vylos/cli
#     3. Enable "Bypass 2FA" for CI usage
#     4. Max expiry: 90 days (must rotate)
#     5. Add as NPM_TOKEN secret in GitHub repo settings

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish @vylos/core
        if: ${{ !inputs.dry-run }}
        run: pnpm --filter @vylos/core publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vylos/cli
        if: ${{ !inputs.dry-run }}
        run: pnpm --filter @vylos/cli publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run — @vylos/core
        if: ${{ inputs.dry-run }}
        run: pnpm --filter @vylos/core publish --access public --no-git-checks --dry-run

      - name: Dry run — @vylos/cli
        if: ${{ inputs.dry-run }}
        run: pnpm --filter @vylos/cli publish --access public --no-git-checks --dry-run
